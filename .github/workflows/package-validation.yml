name: Package Validation

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  validate-upm-package:
    name: Validate UPM package layout
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Validate package manifest and layout
        shell: bash
        run: python3 scripts/validate_upm_package.py
